{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация — TatarSkill{% endblock %}

{% block content %}
<div class="container-custom py-5" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-glass p-5">
                <h2 class="text-center text-warning mb-4">Регистрация</h2>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label text-white">Имя пользователя</label>
                        <input type="text" class="form-control bg-dark text-white border-warning" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-white">Email</label>
                        <input type="email" class="form-control bg-dark text-white border-warning" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password1" class="form-label text-white">Пароль</label>
                        <input type="password" class="form-control bg-dark text-white border-warning" id="password1" name="password1" required>
                    </div>
                    <div class="mb-3">
                        <label for="password2" class="form-label text-white">Подтверждение пароля</label>
                        <input type="password" class="form-control bg-dark text-white border-warning" id="password2" name="password2" required>
                    </div>
                    <button type="submit" class="btn-primary-custom w-100">Зарегистрироваться</button>
                </form>

                <p class="text-center text-white-50 mt-3">
                    Уже есть аккаунт? <a href="{% url 'login' %}" class="text-warning">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
